        // Notification logic (click to dismiss, then restart timer)

// Returns a random delay between 5 and 15 seconds for notification
function getRandomNotifDelay() {
    return Math.floor(Math.random() * (15000 - 5000 + 1)) + 5000;
}
// Hide notification, play sound, launch confetti, and give bonus
function hideNotificationAndRestartTimer() {
    // Play Click.mp3 sound
    const clickSound = document.getElementById('click-sound');
    if (clickSound) {
        clickSound.currentTime = 0;
        clickSound.play();
    }
    // Confetti effect
    launchConfetti();
    // Give 5% of total clicks, animated
    const bonus = Math.ceil(clicks * 0.05);
    let added = 0;
    const steps = 30; // Number of animation steps
    const perStep = Math.max(1, Math.floor(bonus / steps));
    function animateBonus() {
        if (added < bonus) {
            let toAdd = Math.min(perStep, bonus - added);
            clicks += toAdd;
            added += toAdd;
            updateStats();
            renderPowerups();
            setTimeout(animateBonus, 18); // ~30 steps in ~0.5s
        } else {
            // Hide notification and start timer for next
            const notif = document.getElementById('notif-slide');
            notif.style.left = '-350px';
            notif.style.pointerEvents = 'none';
            notifTimer = setTimeout(showNotification, getRandomNotifDelay());
        }
    }
    animateBonus();
}
// Simple confetti effect for notification bonus
function launchConfetti() {
    const colors = ['#ffb300', '#4caf50', '#388e3c', '#ff5252', '#40c4ff', '#ffd600', '#ab47bc']; // Confetti colors
    const confettiCount = 36; // Number of confetti pieces
    const notif = document.getElementById('notif-slide');
    const rect = notif.getBoundingClientRect();
    for (let i = 0; i < confettiCount; i++) {
        const conf = document.createElement('div'); // Create confetti div
        conf.style.position = 'fixed';
        conf.style.left = (rect.left + rect.width/2) + 'px';
        conf.style.top = (rect.top + rect.height/2) + 'px';
        conf.style.width = '10px';
        conf.style.height = '10px';
        conf.style.background = colors[Math.floor(Math.random()*colors.length)];
        conf.style.borderRadius = '50%';
        conf.style.zIndex = 9999;
        conf.style.pointerEvents = 'none';
        conf.style.opacity = '0.85';
        const angle = Math.random() * 2 * Math.PI;
        const distance = 80 + Math.random() * 80;
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;
        const rotate = Math.random() * 360;
        conf.animate([
            { transform: 'translate(0,0) rotate(0deg)', opacity: 0.85 },
            { transform: `translate(${dx}px,${dy}px) rotate(${rotate}deg)`, opacity: 0 }
        ], {
            duration: 900 + Math.random()*400,
            easing: 'cubic-bezier(.61,-0.01,.7,1.01)',
            fill: 'forwards'
        });
        setTimeout(() => conf.remove(), 1300); // Remove confetti after animation
        document.body.appendChild(conf);
    }
}

        // Update stats display in UI
        function updateStats() {
            document.getElementById('clicks').textContent = Math.floor(clicks); // Update clicks
            document.getElementById('cps').textContent = Math.floor(clicksPerSecond); // Update CPS
            document.getElementById('cpc').textContent = Math.floor(clicksPerClick); // Update CPC

        }
        // Renders the powerups dynamically
        // Checks if the powerup has been unlocked based on clicks, and updates the UI accordingly
        function renderPowerups() {
            const container = document.getElementById('powerups'); // Powerups container
            powerups.forEach((p, i) => {
                // Mark as ever unlocked if threshold reached
                if (clicks >= p.unlockAt) {
                    p.everUnlocked = true;
                }
                if (p.everUnlocked) {
                    let div = document.getElementById(`powerup-${i}`); // Get powerup div
                    if (!div) {
                        div = document.createElement('div'); // Create new powerup div
                        div.className = 'powerup';
                        div.id = `powerup-${i}`;
                        let buttonHtml = '';
                        // Disable button if maxCount reached or only one allowed
                        if ((i === 0 && p.count >= p.maxCount) || (p.name === 'Debug' && p.count >= 1) || (p.name === 'Stocks' && p.count >= 1)) {

                        `;

                            document.getElementById(`buy-${i}`).onclick = function() {
                                if (clicks >= p.cost && !((i === 0 && p.count >= p.maxCount) || (p.name === 'debug' && p.count >= 1) || (p.name === 'Stocks' && p.count >= 1))) {
                                    clicks -= p.cost; // Deduct cost
                                    p.count += 1; // Increment count

                                    }

                                    renderPowerups();
                                    // If Textile Fighter, add bouncing gif

        // Adds a bouncing mascot GIF to the screen
        function addBouncingGif() {
            const container = document.getElementById('gif-container'); // Get GIF container
            const gif = document.createElement('img'); // Create image element
            gif.src = 'Fly.gif'; // Set GIF source
            gif.style.position = 'absolute';
            gif.style.height = '100px';
            gif.style.width = 'auto';
            gif.style.left = Math.random() * (window.innerWidth - 100) + 'px'; // Random X position
            gif.style.top = Math.random() * (window.innerHeight - 100) + 'px'; // Random Y position
            container.appendChild(gif);

            // Random direction for bouncing
            let dx = (Math.random() < 0.5 ? 1 : -1) * (2 + Math.random() * 2);
            let dy = (Math.random() < 0.5 ? 1 : -1) * (2 + Math.random() * 2);
            let x = parseFloat(gif.style.left);
            let y = parseFloat(gif.style.top);
            let w = 100, h = 100;

            bouncingGifs.push({gif, x, y, dx, dy, w, h}); // Add to bouncing GIFs array
        }

        // Animates all bouncing GIFs on the screen
        function animateGifs() {
            bouncingGifs.forEach(obj => {
                obj.x += obj.dx; // Move X
                obj.y += obj.dy; // Move Y
                let hitWall = false; // Track if hit wall
                // Bounce off left/right
                let flipped = false;
                if (obj.x <= 0) {
                    obj.x = 0;
                    if (obj.dx < 0) flipped = true;
                    obj.dx = Math.abs(obj.dx);
                    hitWall = true;
                } else if (obj.x + obj.w >= window.innerWidth) {
                    obj.x = window.innerWidth - obj.w;
                    if (obj.dx > 0) flipped = true;
                    obj.dx = -Math.abs(obj.dx);
                    hitWall = true;
                }
                // Bounce off top/bottom
                if (obj.y <= 0) {
                    obj.y = 0;
                    obj.dy = Math.abs(obj.dy);
                    hitWall = true;
                } else if (obj.y + obj.h >= window.innerHeight) {
                    obj.y = window.innerHeight - obj.h;
                    obj.dy = -Math.abs(obj.dy);
                    hitWall = true;
                }
                obj.gif.style.left = obj.x + 'px'; // Update X position
                obj.gif.style.top = obj.y + 'px'; // Update Y position
                // Flip horizontally if direction changed
                if (flipped) {
                    // The original image faces right, so scaleX(-1) should face right, scaleX(1) should face left
                    if (obj.dx > 0) {
                        obj.gif.style.transform = 'scaleX(-1)'; // Facing right
                    } else {
                        obj.gif.style.transform = 'scaleX(1)'; // Facing left
                    }
                    // Always preserve height for proportions
                    obj.gif.style.height = '100px';
                    obj.gif.style.width = 'auto';
                }
                if (hitWall) {
                    clicks += 1; // Add click when hitting wall
                }
            });
        }

            container.style.transform = 'translateY(-50%)';
            container.style.width = '340px';
            container.style.height = '240px';
            container.style.background = '#181818';
            container.style.border = '2px solid #4caf50';
            container.style.borderRadius = '12px';
            container.style.boxShadow = '0 4px 16px rgba(0,0,0,0.12)';
            container.style.zIndex = '9999';
            container.style.padding = '18px 18px 12px 18px';
            container.innerHTML = `
                <div style="font-size:1.3rem;font-weight:bold;color:#fff;margin-bottom:6px;">Stock</div>
                <canvas id="stocks-canvas" width="300" height="100" style="background:#222;border-radius:8px;display:block;margin-bottom:8px;"></canvas>
                <form id="invest-form" style="margin-top:0;display:flex;gap:8px;align-items:center;justify-content:center;">
                    <input id="invest-input" type="number" min="1" max="999999" placeholder="Invest amount" style="width:90px;padding:4px 8px;border-radius:6px;border:1px solid #444;background:#222;color:#fff;font-size:1rem;">
                    <button type="submit" style="background:#4caf50;color:#fff;border:none;border-radius:20px;padding:8px 24px;cursor:pointer;font-size:1rem;">Buy</button>
                    <button id="sell-btn" type="button" style="background:#ff5252;color:#fff;border:none;border-radius:20px;padding:8px 24px;cursor:pointer;font-size:1rem;">Sell</button>
                </form>
                <div id="invested-info" style="margin-top:8px;font-size:1.1rem;color:#fff;text-align:center;"></div>
            `;
            document.body.appendChild(container);
            drawStocksChart(); // Draw initial chart
            // Buy stocks form handler
            document.getElementById('invest-form').onsubmit = function(e) {
                e.preventDefault();
                const val = parseInt(document.getElementById('invest-input').value); // Get invest amount
                if (!isNaN(val) && val > 0 && clicks >= val) {
                    clicks -= val; // Deduct clicks
                    investedAmount += val; // Add to invested
                    buyStockValue = stockValue; // Set buy value
                    updateInvestedInfo(); // Update info
                    updateStats(); // Update stats
                }
                document.getElementById('invest-input').value = '';
            };
            // Sell stocks button handler
            document.getElementById('sell-btn').onclick = function() {
                if (investedAmount > 0) {
                    const payout = Math.floor(investedAmount * (stockValue / buyStockValue)); // Calculate payout
                    clicks += payout; // Add payout to clicks
                    investedAmount = 0; // Reset invested
                    buyStockValue = null; // Reset buy value
                    updateInvestedInfo(); // Update info
                    updateStats(); // Update stats
                }
            };
        }

        // Updates the invested info display below the stocks chart
        function updateInvestedInfo() {
            const info = document.getElementById('invested-info'); // Get info element
            if (!info) return;
            if (investedAmount > 0 && buyStockValue) {
                const currentValue = investedAmount * (stockValue / buyStockValue); // Current value
                const gainLoss = currentValue - investedAmount; // Gain/loss
                let sign = gainLoss > 0 ? '+' : '';
                info.innerHTML = `<span style="color:#fff;">${investedAmount} shares</span> <span style="color:${gainLoss<0?'#ff5252':'#4caf50'};font-weight:bold;">${sign}${gainLoss.toFixed(0)}</span>`;
            } else {
                info.innerHTML = `<span style='color:#fff;'>0 shares</span>`;
            }
        }

        // Draws the stocks chart on the canvas
        function drawStocksChart() {
            const canvas = document.getElementById('stocks-canvas'); // Get canvas
            if (!canvas) return;
            const ctx = canvas.getContext('2d'); // Get context
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear canvas
            // Draw grid lines
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 5; i++) {
                ctx.beginPath();
                ctx.moveTo(0, 20*i);
                ctx.lineTo(canvas.width, 20*i);
                ctx.stroke();
            }
            // Draw smooth curve using quadratic Bezier
            ctx.strokeStyle = '#4caf50';
            ctx.lineWidth = 3;
            ctx.beginPath();
            let min = Math.min(...stockHistory); // Minimum value
            let max = Math.max(...stockHistory); // Maximum value
            let range = max - min || 1; // Value range
            let prevX = 10, prevY = 90 - ((stockHistory[0] - min) / range) * 80; // Start point
            ctx.moveTo(prevX, prevY);
            for (let i = 1; i < stockHistory.length; i++) {
                let x = 10 + (i * 7);
                let y = 90 - ((stockHistory[i] - min) / range) * 80;
                let cpx = prevX + (x - prevX) / 2;
                let cpy = prevY;
                ctx.quadraticCurveTo(cpx, cpy, x, y); // Draw curve
                prevX = x; prevY = y;
            }
            ctx.stroke();
            // Fill under curve
            ctx.lineTo(prevX, 100);
            ctx.lineTo(10, 100);
            ctx.closePath();
            ctx.globalAlpha = 0.18;
            ctx.fillStyle = '#4caf50';
            ctx.fill();
            ctx.globalAlpha = 1;
            // No value label inside graph
        }

        // Initial UI update and notification
        updateStats(); // Update stats
        renderPowerups(); // Render powerups
        setTimeout(showNotification, 1000); // Show first notification after 1s
    </script>
    
</body>
</html>
